<!-- ============================================================
     フリーパーツ 06: ギフト/特別セクション + トラストストリップ
     - 「贈り物に」「特別な日に」の2カラムビジュアル
     - 信頼ポイント3つ（一頭買い直営・品質保証・送料無料）
     ============================================================ -->
<!-- ▼ 画像を変更する場合はsrc="..."の部分を書き換えてください ▼ -->
<!-- ▼ {FS_IMG_PATH} はFutureshopの画像アップロード先パスに置き換えてください（例: https://kingmeat.itembox.cloud/item/images/top/） ▼ -->
<!-- ▼ リンク先を変更する場合はhref="..."の部分を書き換えてください ▼ -->
<!-- ▼ テキストを変更する場合は該当のテキストを書き換えてください ▼ -->

<div class="km-wrapper">
  <!-- ===== GIFT / SPECIAL SPLIT ===== -->
  <section class="km-split-feature km-section" id="splitFeature">
    <div class="km-split-feature__grid">
      <!-- ▼ 左カラム: ギフト ▼ -->
      <a href="https://www.kingmeat.net/c/gift" class="km-split-feature__item km-fade-in">
        <div class="km-split-feature__img-wrap">
          <img src="{FS_IMG_PATH}/category-gift.jpg" alt="ギフト" class="km-split-feature__img" loading="lazy">
        </div>
        <div class="km-split-feature__overlay">
          <div class="km-split-feature__text-panel">
            <span class="km-split-feature__en">GIFT</span>
            <h3 class="km-split-feature__heading">贈り物に</h3>
            <p class="km-split-feature__desc">大切な方への贈り物に、最高級の神戸牛を。<br>熨斗・ギフト包装無料対応。</p>
          </div>
        </div>
      </a>
      <!-- ▼ 右カラム: 特別な日に ▼ -->
      <a href="https://www.kingmeat.net/c/all" class="km-split-feature__item km-fade-in">
        <div class="km-split-feature__img-wrap">
          <img src="{FS_IMG_PATH}/hero-block.jpg" alt="特別な日に" class="km-split-feature__img" loading="lazy">
        </div>
        <div class="km-split-feature__overlay">
          <div class="km-split-feature__text-panel">
            <span class="km-split-feature__en">SPECIAL</span>
            <h3 class="km-split-feature__heading">特別な日に</h3>
            <p class="km-split-feature__desc">記念日やお祝いの食卓を、<br>最高のお肉で彩りましょう。</p>
          </div>
        </div>
      </a>
    </div>
  </section>

  <!-- ===== TRUST STRIP ===== -->
  <section class="km-trust km-section">
    <div class="km-container">
      <div class="km-trust__grid">
        <!-- ▼ トラスト1: 一頭買い直営 ▼ -->
        <div class="km-trust__item km-fade-in">
          <div class="km-trust__icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <circle cx="24" cy="24" r="22" stroke="#C9A96E" stroke-width="1.2"/>
              <path d="M16 24.5L21 29.5L32 18.5" stroke="#C9A96E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="km-trust__text">
            <h4 class="km-trust__heading">一頭買い直営</h4>
            <p class="km-trust__desc">中間業者なし。だから高品質・低価格。</p>
          </div>
        </div>
        <!-- ▼ トラスト2: 品質保証 ▼ -->
        <div class="km-trust__item km-fade-in">
          <div class="km-trust__icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <circle cx="24" cy="24" r="22" stroke="#C9A96E" stroke-width="1.2"/>
              <path d="M24 14L27.1 20.3L34 21.3L29 26.2L30.1 33.1L24 29.9L17.9 33.1L19 26.2L14 21.3L20.9 20.3L24 14Z" stroke="#C9A96E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="km-trust__text">
            <h4 class="km-trust__heading">品質保証</h4>
            <p class="km-trust__desc">A5等級の証明書付き。安心をお届け。</p>
          </div>
        </div>
        <!-- ▼ トラスト3: 送料無料 ▼ -->
        <div class="km-trust__item km-fade-in">
          <div class="km-trust__icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <circle cx="24" cy="24" r="22" stroke="#C9A96E" stroke-width="1.2"/>
              <path d="M15 22H33V32C33 33.1 32.1 34 31 34H17C15.9 34 15 33.1 15 32V22Z" stroke="#C9A96E" stroke-width="1.5"/>
              <path d="M19 22V18C19 15.2 21.2 13 24 13C26.8 13 29 15.2 29 18V22" stroke="#C9A96E" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="24" cy="27" r="1.5" fill="#C9A96E"/>
            </svg>
          </div>
          <div class="km-trust__text">
            <h4 class="km-trust__heading">送料無料</h4>
            <p class="km-trust__desc">全国送料無料でお届けいたします。</p>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
