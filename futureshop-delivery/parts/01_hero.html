<!-- ▼ 画像を変更する場合はsrc="..."の部分を書き換えてください ▼ -->
<!-- ▼ {FS_IMG_PATH} はFutureshopの画像アップロード先パスに置き換えてください（例: https://kingmeat.itembox.cloud/item/images/top/） ▼ -->
<!-- ▼ リンク先を変更する場合はhref="..."の部分を書き換えてください ▼ -->
<!-- ▼ テキストを変更する場合は該当のテキストを書き換えてください ▼ -->

<div class="km-wrapper">
  <section class="km-hero" id="hero">
    <div class="km-hero__text km-fade-in">
      <p class="km-hero__badge">一頭買い専門店</p>
      <h1 class="km-hero__title">神戸牛・黒毛和牛を<br><span class="km-hero__title-accent">驚きの価格</span>で！</h1>
      <p class="km-hero__desc">セリ市場から直接仕入れ、中間コストを大幅カット。<br>プロが選んだA5ランクのお肉をご家庭へ。</p>
      <div class="km-hero__buttons">
        <a href="https://www.kingmeat.net/c/all" class="km-hero__cta">商品を見る</a>
        <a href="https://www.kingmeat.net/c/gift" class="km-hero__cta-sub">ギフトはこちら</a>
      </div>
      <div class="km-hero__trust-badges">
        <span class="km-hero__trust-item km-hero__trust-item--primary">A5等級</span>
        <span class="km-hero__trust-item km-hero__trust-item--primary">即日発送対応</span>
        <span class="km-hero__trust-item">送料無料<small>※</small></span>
        <span class="km-hero__trust-item">神戸肉之証付き</span>
      </div>
      <p class="km-hero__shipping-note">※北海道・沖縄は別途送料がかかります</p>
    </div>
    <div class="km-hero__images km-fade-in">
      <div class="km-hero__img-main">
        <!-- ▼ 画像を変更する場合はsrc="..."の部分を書き換えてください ▼ -->
        <img src="{FS_IMG_PATH}/hero-main.jpg" alt="最高級黒毛和牛サーロイン" class="km-hero__img" width="800" height="533">
      </div>
      <div class="km-hero__img-sub-grid">
        <div class="km-hero__img-sub">
          <!-- ▼ 画像を変更する場合はsrc="..."の部分を書き換えてください ▼ -->
          <img src="{FS_IMG_PATH}/hero-sub1.jpg" alt="セリ市場で直接仕入れ" class="km-hero__img" width="800" height="533">
        </div>
        <div class="km-hero__img-sub">
          <!-- ▼ 画像を変更する場合はsrc="..."の部分を書き換えてください ▼ -->
          <img src="{FS_IMG_PATH}/hero-sub2.jpg" alt="黒毛和牛ブロック肉" class="km-hero__img" width="800" height="533">
        </div>
      </div>
    </div>
  </section>
</div>
