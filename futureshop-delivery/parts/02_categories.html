<!-- ============================================================
     フリーパーツ 02: カテゴリセクション（食べ方で選ぶ）
     - 焼肉、ステーキ、すき焼き、しゃぶしゃぶ、ギフト、ブロック肉
     ============================================================ -->
<!-- ▼ 画像を変更する場合はsrc="..."の部分を書き換えてください ▼ -->
<!-- ▼ {FS_IMG_PATH} はFutureshopの画像アップロード先パスに置き換えてください（例: https://kingmeat.itembox.cloud/item/images/top/） ▼ -->
<!-- ▼ リンク先を変更する場合はhref="..."の部分を書き換えてください ▼ -->
<!-- ▼ テキストを変更する場合は該当のテキストを書き換えてください ▼ -->

<div class="km-wrapper">
  <section class="km-categories km-section" id="categories">
    <div class="km-container">
      <div class="km-section-header km-fade-in">
        <h2 class="km-section-title">食べ方で選ぶ</h2>
        <div class="km-section-line"></div>
      </div>
      <!-- ▼ おすすめ: 食べ比べセット ▼ -->
      <div class="km-categories__recommend km-fade-in">
        <a href="https://www.kingmeat.net/c/kuraberu" class="km-recommend-banner">
          <div class="km-recommend-banner__img-wrap">
            <img src="{FS_IMG_PATH}/category-kuraberu.jpg" alt="食べ比べセット" class="km-recommend-banner__img" loading="lazy">
          </div>
          <div class="km-recommend-banner__text">
            <span class="km-recommend-banner__badge">RECOMMEND</span>
            <h3 class="km-recommend-banner__title">食べ比べセット</h3>
            <p class="km-recommend-banner__desc">人気の部位を少しずつ。初めての方にもおすすめの贅沢セットです。</p>
          </div>
        </a>
      </div>
      <div class="km-categories__grid">
        <!-- ▼ カテゴリ1: 焼肉 ▼ -->
        <a href="https://www.kingmeat.net/c/yakiniku" class="km-category-card km-fade-in">
          <div class="km-category-card__img-wrap">
            <img src="{FS_IMG_PATH}/category-yakiniku.jpg" alt="焼肉" class="km-category-card__img" loading="lazy">
          </div>
          <div class="km-category-card__overlay">
            <h3 class="km-category-card__name">焼肉</h3>
            <span class="km-category-card__en">YAKINIKU</span>
          </div>
        </a>
        <!-- ▼ カテゴリ2: ステーキ ▼ -->
        <a href="https://www.kingmeat.net/c/steak" class="km-category-card km-fade-in">
          <div class="km-category-card__img-wrap">
            <img src="{FS_IMG_PATH}/hero-wagyu-sirloin.jpg" alt="ステーキ" class="km-category-card__img" loading="lazy">
          </div>
          <div class="km-category-card__overlay">
            <h3 class="km-category-card__name">ステーキ</h3>
            <span class="km-category-card__en">STEAK</span>
          </div>
        </a>
        <!-- ▼ カテゴリ3: すき焼き ▼ -->
        <a href="https://www.kingmeat.net/c/sukiyaki" class="km-category-card km-fade-in">
          <div class="km-category-card__img-wrap">
            <img src="{FS_IMG_PATH}/category-sukiyaki.jpg" alt="すき焼き" class="km-category-card__img" loading="lazy">
          </div>
          <div class="km-category-card__overlay">
            <h3 class="km-category-card__name">すき焼き</h3>
            <span class="km-category-card__en">SUKIYAKI</span>
          </div>
        </a>
        <!-- ▼ カテゴリ4: しゃぶしゃぶ ▼ -->
        <a href="https://www.kingmeat.net/c/shabu" class="km-category-card km-fade-in">
          <div class="km-category-card__img-wrap">
            <img src="{FS_IMG_PATH}/category-shabushabu.jpg" alt="しゃぶしゃぶ" class="km-category-card__img" loading="lazy">
          </div>
          <div class="km-category-card__overlay">
            <h3 class="km-category-card__name">しゃぶしゃぶ</h3>
            <span class="km-category-card__en">SHABU SHABU</span>
          </div>
        </a>
        <!-- ▼ カテゴリ5: 細切れ・切り落とし ▼ -->
        <a href="https://www.kingmeat.net/c/komagire" class="km-category-card km-fade-in">
          <div class="km-category-card__img-wrap">
            <img src="{FS_IMG_PATH}/category-komagire.jpg" alt="細切れ・切り落とし" class="km-category-card__img" loading="lazy">
          </div>
          <div class="km-category-card__overlay">
            <h3 class="km-category-card__name">細切れ・切り落とし</h3>
            <span class="km-category-card__en">KOMAGIRE</span>
          </div>
        </a>
        <!-- ▼ カテゴリ6: 牛すじ・お料理用 ▼ -->
        <a href="https://www.kingmeat.net/c/suji" class="km-category-card km-fade-in">
          <div class="km-category-card__img-wrap">
            <img src="{FS_IMG_PATH}/category-suji.jpg" alt="牛すじ・お料理用" class="km-category-card__img" loading="lazy">
          </div>
          <div class="km-category-card__overlay">
            <h3 class="km-category-card__name">牛すじ・お料理用</h3>
            <span class="km-category-card__en">COOKING</span>
          </div>
        </a>
      </div>
    </div>
  </section>
</div>
